name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --ci --passWithNoTests

  coverage-required:
    name: Coverage (Required Slice Gate)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage:slice -- --ci

  coverage-advisory:
    name: Coverage (Advisory Full Project)
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage:advisory -- --ci

  smoke:
    name: Smoke (Qdrant + Stripe Container)
    runs-on: ubuntu-latest
    needs: [test]
    services:
      qdrant:
        image: qdrant/qdrant:v1.15.4
        ports:
          - 6333:6333
      stripe-mock:
        image: stripe/stripe-mock:v0.197.0
        ports:
          - 12111:12111
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:6333/collections >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Qdrant did not become ready in time"
          exit 1

      - name: Wait for stripe-mock
        run: |
          for i in {1..30}; do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:12111/)
            if [ "$status_code" != "000" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "stripe-mock did not become reachable in time"
          exit 1

      - run: pnpm test:smoke -- --ci
        env:
          RUN_CONTAINER_SMOKE: "1"
          QDRANT_URL: "http://127.0.0.1:6333"
          STRIPE_SECRET_KEY: "sk_test_smoke"
          STRIPE_WEBHOOK_SECRET: "whsec_smoke"
          STRIPE_MOCK_HOST: "127.0.0.1"
          STRIPE_MOCK_PORT: "12111"

  build:
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, coverage-required, smoke]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
